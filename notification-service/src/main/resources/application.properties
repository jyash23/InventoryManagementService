spring.application.name=notification-service
server.port=${SERVER_PORT:8080}
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://localhost:27017/notification_service}
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:notification-service}
spring.kafka.consumer.auto-offset-reset=earliest
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
app.kafka.topic.order-placed=${APP_KAFKA_TOPIC_ORDER_PLACED:order.placed}
