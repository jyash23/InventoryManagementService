services:
  kafka:
    ports: []

  mongodb:
    ports: []

  mysql-inventory:
    ports: []

  mysql-order:
    ports: []

  discovery-server:
    ports: []

  inventory-service:
    ports: []

  product-service:
    ports: []

  order-service:
    ports: []

  notification-service:
    ports: []

  api-gateway:
    ports:
      - "8088:8080"
    environment:
      APP_AUTH_USERNAME: ${APP_AUTH_USERNAME}
      APP_AUTH_PASSWORD: ${APP_AUTH_PASSWORD}
      APP_AUTH_SECRET: ${APP_AUTH_SECRET}
      APP_AUTH_EXPIRATION_MS: ${APP_AUTH_EXPIRATION_MS:-3600000}
