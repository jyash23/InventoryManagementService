syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.inventory.inventory_service.grpc";
option java_outer_classname = "InventoryProto";

package inventory;

service InventoryGrpcService {
  rpc ReserveInventory (ReserveInventoryGrpcRequest) returns (ReserveInventoryGrpcResponse);
}

message ReserveInventoryItem {
  string skuCode = 1;
  int32 quantity = 2;
}

message ReserveInventoryGrpcRequest {
  repeated ReserveInventoryItem items = 1;
}

message ReserveInventoryGrpcResponse {
  bool reserved = 1;
  string message = 2;
}
