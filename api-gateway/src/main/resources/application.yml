server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: product-service-route
          uri: lb://product-service   # ? Eureka LB
          predicates:
            - Path=/api/product/**    # ? SAME as backend
          # ? No StripPrefix

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: TRACE